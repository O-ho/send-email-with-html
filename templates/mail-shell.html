<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보안메일 열람</title>
<style type="text/css">
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { font-size: 62.5%; }
body {
  font-size: 1.4rem;
  font-family: '나눔고딕', AppleSDGothicNeo, malgungothic, '맑은 고딕', dotum, '돋움', sans-serif;
  line-height: 1.5;
  color: #343a40;
  background: #f1f3f5;
  min-height: 100vh;
}
#gate {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
}
.card {
  width: 100%;
  max-width: 36rem;
  padding: 4rem 2rem;
  border-radius: 1rem;
  background: #fff;
  box-shadow: 0 0 0.5rem rgba(0, 0, 0, 0.1);
}
.ly_header {
  margin-bottom: 1.6rem;
  text-align: center;
  font-size: 2rem;
  font-weight: bold;
  color: #212528;
  line-height: 1.35;
  word-break: keep-all;
}
.ly_body2 {
  margin-bottom: 2rem;
  text-align: center;
  color: #6d747b;
  font-size: 1.5rem;
}
#password {
  display: block;
  width: 100%;
  -webkit-text-security: disc;
  padding: 1.5rem;
  border-radius: 0.8rem;
  border: 0.1rem solid #c5cbd1;
  background: #f8f9fa;
  font-size: 1.6rem;
  letter-spacing: 0.2em;
  text-align: center;
}
#confirm {
  display: block;
  width: 100%;
  margin-top: 1rem;
  padding: 1.5rem;
  border-radius: 0.8rem;
  border: none;
  background: #2489f4;
  font-size: 1.4rem;
  color: #fff;
  cursor: pointer;
}
#confirm:hover { filter: brightness(1.05); }
.err {
  margin-top: 1.2rem;
  text-align: center;
  color: #ee444a;
  font-size: 1.3rem;
}
#content {
  display: none;
  width: 100%;
  min-height: 100vh;
  border: 0;
}
</style>
</head>
<body>
<div id="gate">
  <div class="card">
    <div class="ly_header">보안메일 비밀번호를<br>입력해 주세요</div>
    <div class="ly_body2">주민등록번호 앞자리(6자) 입력</div>
    <form id="decForm" autocomplete="off">
      <input type="password" id="password" maxlength="16" inputmode="numeric" placeholder="6자리" title="비밀번호" />
      <button type="submit" id="confirm">확인</button>
      <p id="err" class="err" hidden></p>
    </form>
  </div>
</div>
<iframe id="content" title="거래내역"></iframe>

<script id="enc-payload" type="text/plain">__PAYLOAD_B64__</script>
<script>__CRYPTO_JS__</script>
<script>
(function () {
  var form = document.getElementById('decForm');
  var err = document.getElementById('err');
  var ua = navigator.userAgent || '';
  var isIOS = /iPhone|iPad|iPod/i.test(ua);
  var isFileProtocol = location.protocol === 'file:';

  function showError(msg) {
    err.hidden = false;
    err.textContent = msg;
  }

  function renderDecryptedHtml(html) {
    if (isIOS && isFileProtocol) {
      try {
        document.open();
        document.write(html);
        document.close();
        return;
      } catch (_) {}
    }

    document.getElementById('gate').style.display = 'none';
    var iframe = document.getElementById('content');
    iframe.style.display = 'block';

    try {
      if ('srcdoc' in iframe) {
        iframe.srcdoc = html;
        return;
      }
    } catch (_) {}

    try {
      var doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open();
      doc.write(html);
      doc.close();
      return;
    } catch (_) {}

    try {
      var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      iframe.src = url;
      return;
    } catch (_) {}

    showError('복호화는 완료되었지만 화면 렌더링에 실패했습니다. 다른 브라우저에서 열어주세요.');
  }

  function decryptWithCryptoJs(payload, password) {
    if (!window.CryptoJS) {
      throw new Error('CryptoJS not available');
    }
    var salt = CryptoJS.enc.Base64.parse(payload.salt);
    var iv = CryptoJS.enc.Base64.parse(payload.iv);
    var key = CryptoJS.PBKDF2(password, salt, {
      keySize: 256 / 32,
      iterations: payload.iter || 10000,
      hasher: CryptoJS.algo.SHA256
    });
    var decrypted = CryptoJS.AES.decrypt(
      { ciphertext: CryptoJS.enc.Base64.parse(payload.ct) },
      key,
      { iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }
    );
    var html = CryptoJS.enc.Utf8.stringify(decrypted);
    if (!html) {
      throw new Error('decrypt failed');
    }
    return html;
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    err.hidden = true;
    var pwd = document.getElementById('password').value;
    var raw = (document.getElementById('enc-payload').textContent || '').trim();
    var payload;
    if (!raw || raw.indexOf('__PAYLOAD_B64__') !== -1) {
      showError('암호화된 첨부 HTML이 아닙니다. 템플릿 원본 파일이 아니라 생성된 report 파일을 열어주세요.');
      return;
    }
    try {
      payload = JSON.parse(atob(raw));
    } catch (parseErr) {
      console.error('[secure-mail] payload parse failed', parseErr);
      showError('암호화 데이터 형식이 올바르지 않습니다. 생성된 첨부 파일인지 확인해 주세요.');
      return;
    }

    if (payload && payload.v === 2 && payload.alg === 'AES-256-CBC-PBKDF2') {
      try {
        var htmlV2 = decryptWithCryptoJs(payload, pwd);
        renderDecryptedHtml(htmlV2);
      } catch (_) {
        showError('비밀번호가 올바르지 않거나 파일이 손상되었습니다.');
      }
      return;
    }

    if (!window.crypto || !window.crypto.subtle) {
      if (isIOS && isFileProtocol) {
        showError('iOS 파일앱(file://)에서는 보안 복호화가 제한될 수 있습니다. Safari에서 https 링크로 열어주세요.');
        return;
      }
      showError('이 브라우저에서는 Web Crypto를 사용할 수 없습니다.');
      return;
    }
    var enc = new TextEncoder();
    crypto.subtle.digest('SHA-256', enc.encode(pwd)).then(function (hashBuf) {
      var keyBytes = hashBuf.slice(0, 16);
      return crypto.subtle.importKey('raw', keyBytes, { name: 'AES-GCM' }, false, ['decrypt']);
    }).then(function (key) {
      var iv = Uint8Array.from(atob(payload.iv), function (c) { return c.charCodeAt(0); });
      var ct = Uint8Array.from(atob(payload.ct), function (c) { return c.charCodeAt(0); });
      return crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv, tagLength: 128 }, key, ct);
    }).then(function (pt) {
      var html = new TextDecoder().decode(pt);
      renderDecryptedHtml(html);
    }).catch(function () {
      if (isIOS && isFileProtocol) {
        showError('iOS 파일앱 환경에서는 복호화가 실패할 수 있습니다. Safari에서 https 링크로 열어 다시 시도해 주세요.');
        return;
      }
      showError('비밀번호가 올바르지 않거나 파일이 손상되었습니다.');
    });
  });
})();
</script>
</body>
</html>
